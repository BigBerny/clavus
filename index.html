<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Clavus" />
    <meta name="theme-color" content="#110e0c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fdfaf4" media="(prefers-color-scheme: light)" />
    <!-- Paint the app background before any JS/CSS loads, so reloads never
         flash white in dark mode (the <html class="dark"> default wins until
         the theme store re-applies the stored choice). -->
    <style>
      html { background: #fdfaf4; }
      html.dark { background: #110e0c; }
    </style>
    <title>Clavus</title>
  </head>
  <body>
    <div id="root"></div>
    <script async src="/dashboard-logger.js" data-service="openclaw-client"></script>

  </body>
</html>
